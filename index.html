<!DOCTYPE html>
<html>
<head>
    <title>NeuroControl Remote</title>
    <style>
        body { background: #1a1a2e; color: #e94560; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #box { background: #16213e; border: 1px solid #0f3460; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h1 { margin-bottom: 25px; text-transform: uppercase; letter-spacing: 3px; font-size: 1.5rem; }
        .control-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: #4ecca3; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #e94560; }
        .status { margin-top: 20px; font-size: 0.7rem; color: #533483; }
    </style>
</head>
<body>
    <div id="box">
        <h1>NeuroControl</h1>
        
        <div class="control-group">
            <label>Distortion (Painful Frequency)</label>
            <input type="range" id="distSlider" min="0" max="1" step="0.01" value="0">
        </div>

        <div class="control-group">
            <label>Lowpass (Muffle/Underwater)</label>
            <input type="range" id="lowSlider" min="0" max="1" step="0.01" value="0">
        </div>

        <div class="control-group">
            <label>Echo (Processing Lag)</label>
            <input type="range" id="echoSlider" min="0" max="1" step="0.01" value="0">
        </div>

        <p class="status">System Status: <span id="connStatus">Ready to Broadcast</span></p>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
